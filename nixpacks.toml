[phases.setup]
nixPkgs = ["php83", "php83Extensions.pdo_mysql", "php83Extensions.mbstring", "php83Extensions.xml", "php83Extensions.curl", "php83Extensions.zip", "php83Extensions.gd", "php83Extensions.fileinfo", "php83Extensions.tokenizer", "php83Extensions.ctype", "php83Extensions.session", "composer"]

[phases.build]
cmds = [
  "composer install --no-dev --optimize-autoloader",
  "php artisan config:cache",
  "php artisan route:cache",
  "php artisan view:cache",
  "php artisan migrate --force",
  "php artisan storage:link || true"
]

[start]
cmd = "php -d upload_max_filesize=100M -d post_max_size=105M -d memory_limit=256M -d variables_order=EGPCS -S 0.0.0.0:$PORT -t public public/index.php"
