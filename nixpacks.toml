[phases.setup]
nixPkgs = [
  "php83",
  "php83Extensions.pdo",
  "php83Extensions.pdo_mysql",
  "php83Extensions.mbstring",
  "php83Extensions.xml",
  "php83Extensions.curl",
  "php83Extensions.zip",
  "php83Extensions.gd",
  "php83Extensions.fileinfo",
  "php83Extensions.tokenizer",
  "php83Extensions.ctype",
  "php83Extensions.session",
  "php83Extensions.opcache",
  "composer"
]

[phases.install]
cmds = ["composer install --no-dev --optimize-autoloader --no-scripts --ignore-platform-req=ext-gd"]

[phases.build]
cmds = [
  "php artisan migrate --force",
  "php artisan config:clear",
  "php artisan route:clear"
]

[start]
cmd = "php -d upload_max_filesize=100M -d post_max_size=105M -d memory_limit=256M -S 0.0.0.0:$PORT -t public public/index.php"
